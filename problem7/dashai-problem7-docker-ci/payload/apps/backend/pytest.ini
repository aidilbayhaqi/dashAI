[pytest]
testpaths = src/tests
python_files = test_*.py
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    -ra
markers =
    static: tests that inspect routes, source code, schemas, or contracts
    unit: isolated tests without external services
    integration: tests requiring database, Redis, or application lifecycle
    live: tests requiring the running HTTP or WebSocket server
asyncio_mode = auto
filterwarnings =
    error::RuntimeWarning
