name: DashAI CI

on:
  push:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dashai_test
          POSTGRES_USER: dashai
          POSTGRES_PASSWORD: dashai_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashai -d dashai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        shell: bash
        working-directory: apps/backend

    env:
      CI: "true"
      PYTHONPATH: ${{ github.workspace }}/apps/backend
      PYTHONDONTWRITEBYTECODE: "1"

      ENVIRONMENT: development
      DEBUG: "false"
      LOG_LEVEL: INFO
      ENABLE_REALTIME_LISTENER: "false"

      DATABASE_URL: postgresql+asyncpg://dashai:dashai_test_password@127.0.0.1:5432/dashai_test

      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      REDIS_DB: "0"

      JWT_SECRET: ci-only-jwt-secret-key-that-is-long-enough-123456789
      COOKIE_SECURE: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

      UPLOAD_DIR: /tmp/dashai-uploads
      TEST_BASE_URL: http://127.0.0.1:8000
      TEST_EMAIL: superadmin@dashai.test
      TEST_PASSWORD: admin123

      DASHAI_FRONTEND_ROOT: ${{ github.workspace }}/apps/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements*.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare writable upload directories
        run: |
          mkdir -p \
            /tmp/dashai-uploads/public \
            /tmp/dashai-uploads/private

      - name: Check Python syntax
        run: python src/scripts/syntax_check.py

      - name: Backend lint
        run: ruff check src migrations

      - name: Backend security scan
        run: bandit -q -r src -x src/tests -lll

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Verify migration head
        run: |
          python -m alembic current
          python -m alembic heads

      - name: Seed test database
        run: python -m src.seed

      - name: Start API server
        run: |
          python -m uvicorn src.main:app \
            --host 127.0.0.1 \
            --port 8000 \
            > /tmp/dashai-api.log 2>&1 &

          echo $! > /tmp/dashai-api.pid

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ready \
              | grep -q '"status":"ready"'; then
              echo "DashAI API is ready."
              exit 0
            fi

            echo "Waiting for API... ${attempt}/30"
            sleep 2
          done

          echo "API failed to become ready."
          cat /tmp/dashai-api.log
          exit 1

      - name: Run backend tests
        run: |
          python -m pytest \
            -q \
            -p no:cacheprovider

      - name: Show API log on failure
        if: failure()
        run: |
          if [ -f /tmp/dashai-api.log ]; then
            cat /tmp/dashai-api.log
          fi

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/dashai-api.pid ]; then
            kill "$(cat /tmp/dashai-api.pid)" 2>/dev/null || true
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    defaults:
      run:
        shell: bash
        working-directory: apps/frontend

    env:
      CI: "true"
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Verify TypeScript installation
        run: |
          pnpm --version
          pnpm exec tsc --version
          pnpm list typescript --depth 0

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Frontend lint
        run: pnpm lint

      - name: Frontend unit tests
        run: pnpm exec vitest run --reporter=default

      - name: Production build
        run: pnpm build
  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate production Compose
        run: |
          docker compose \
            --env-file .env.production.example \
            -f docker-compose.production.yml \
            config -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: false
          tags: dashai-api:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: false
          tags: dashai-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
